<!DOCTYPE html>
<html>

<head>

<title>Alert Message</title>

<style>

body{

    font-family:Arial;
    background-color:#e7ecef;
    text-align:center;
    margin-top:80px;

}


.card{

    background-color:white;
    width:350px;
    padding:35px;
    margin:auto;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.12);

}


h2{

    color:#455a64;

}


button{

    background-color:#718792;
    color:white;
    border:none;
    padding:12px 28px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;

}


button:hover{

    background-color:#546e7a;

}


</style>

</head>


<body>


<div class="card">


<h2>Alert Message Example</h2>


<p>Click the button to see an alert</p>


<button onclick="showAlert()">
Click Here
</button>


</div>



<script>


function showAlert(){


    alert("Hello! Button was clicked successfully.");


}


</script>



</body>

</html>
